<body style="margin:0;font-family:Arial,sans-serif;background:#f4f1eb;">

<header style="background:#1a1814;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="display:flex;flex-direction:column;">
      <div><span style="font-size:36px;font-weight:900;color:#c0392b;">E</span><span style="font-size:36px;font-weight:900;color:#fff;">GLIN</span></div>
      <div style="height:2px;background:#c0392b;"></div>
      <div><span style="font-size:36px;font-weight:900;color:#c0392b;">G</span><span style="font-size:36px;font-weight:900;color:#fff;">YM</span></div>
    </div>
  </div>
  <div style="color:#888;font-size:11px;">EglinGym Test</div>
</header>

<div style="background:#1a1814;padding:10px 20px;display:flex;align-items:center;gap:8px;">
  <button onclick="changeWeek(-1)" style="background:none;border:1px solid #333;color:#777;padding:7px 14px;cursor:pointer;">&larr;</button>
  <div id="calLbl" style="flex:1;text-align:center;color:#666;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;"></div>
  <button onclick="goToToday()" style="background:none;border:1px solid #333;color:#777;padding:7px 14px;cursor:pointer;font-size:11px;letter-spacing:2px;text-transform:uppercase;">Today</button>
  <button onclick="changeWeek(1)" style="background:none;border:1px solid #333;color:#777;padding:7px 14px;cursor:pointer;">&rarr;</button>
</div>

<div id="weekStrip" style="background:#1a1814;border-top:1px solid #222;display:flex;overflow-x:auto;"></div>

<div style="padding:20px;">
  <div id="dayContainer"><p style="color:#888;">Loading...</p></div>
</div>

<script>
var weekOff = 0, curDay = 0;
var DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var THEMES = ["Push","Legs","Push+","Pull","Hinge","Full","Pull+"];
var MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function monOfWeek(off) {
  var t = new Date(), dow = t.getDay();
  var d = new Date(t);
  d.setDate(t.getDate() + (dow===0?-6:1-dow) + off*7);
  d.setHours(0,0,0,0);
  return d;
}
function weekDates(off) {
  var m = monOfWeek(off);
  return Array.from({length:7}, function(_,i){ var d=new Date(m); d.setDate(m.getDate()+i); return d; });
}
function isToday(d) {
  var t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}

function render() {
  var dates = weekDates(weekOff);
  var s = dates[0], e = dates[6];
  document.getElementById("calLbl").textContent = s.getDate()+" - "+e.getDate()+" "+MON[e.getMonth()]+" "+e.getFullYear();
  
  var strip = document.getElementById("weekStrip");
  strip.innerHTML = "";
  for (var i = 0; i < 7; i++) {
    var btn = document.createElement("button");
    btn.style.cssText = "flex:1;min-width:58px;padding:8px 4px;background:"+(i===curDay?"#c0392b":"none")+";color:"+(isToday(dates[i])?"#e67e22":"#bbb")+";border:none;border-right:1px solid #333;cursor:pointer;";
    btn.innerHTML = "<span style='display:block;font-size:11px;font-weight:700;text-transform:uppercase;'>"+DAYS[i]+"</span>"+
      "<span style='display:block;font-size:17px;font-weight:900;'>"+dates[i].getDate()+"</span>"+
      "<span style='display:block;font-size:7px;text-transform:uppercase;'>"+THEMES[i]+"</span>";
    (function(idx){ btn.onclick = function(){ curDay=idx; render(); }; })(i);
    strip.appendChild(btn);
  }
  
  var DNAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  var MON2 = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var date = dates[curDay];
  document.getElementById("dayContainer").innerHTML = 
    "<h2 style='font-size:36px;font-weight:900;text-transform:uppercase;'>"+DNAMES[curDay]+"</h2>"+
    "<p style='color:#888;margin-top:4px;'>"+date.getDate()+" "+MON2[date.getMonth()]+" "+date.getFullYear()+"</p>"+
    "<p style='color:#27ae60;margin-top:4px;font-weight:700;'>"+(isToday(date)&&weekOff===0?"Today":"")+"</p>"+
    "<p style='margin-top:16px;'>If you can see this, the app structure works perfectly.</p>";
}

function changeWeek(delta) { weekOff += delta; render(); }
function goToToday() { weekOff=0; var dow=new Date().getDay(); curDay=dow===0?6:dow-1; render(); }

var dow = new Date().getDay();
curDay = dow===0 ? 6 : dow-1;
render();
</script>
