<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EglinGym -- Private Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg-primary: #1a1814;
  --bg-secondary: #222019;
  --bg-card: #2a2722;
  --bg-card-hover: #332f2b;
  --red: #c0392b;
  --red-light: #e74c3c;
  --red-dark: #962d22;
  --white: #f5f0eb;
  --white-dim: #b8b0a5;
  --white-muted: #7a7268;
  --grey: #4a4540;
  --grey-light: #5a5550;
  --green: #27ae60;
  --green-dark: #1e8449;
  --gold: #d4a34a;
  --font-heading: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
font-family: var(–font-body);
background: var(–bg-primary);
color: var(–white);
min-height: 100vh;
overflow-x: hidden;
font-weight: 400;
line-height: 1.5;
}
button { cursor: pointer; font-family: var(–font-body); border: none; background: none; color: var(–white); }
input, select, textarea { font-family: var(–font-body); color: var(–white); background: var(–bg-secondary); border: 1px solid var(–grey); border-radius: var(–radius); padding: 8px 12px; font-size: 0.95rem; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(–red); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(–bg-primary); }
::-webkit-scrollbar-thumb { background: var(–grey); border-radius: 3px; }

/* ===== HEADER ===== */
.header {
background: var(–bg-primary);
border-bottom: 2px solid var(–red);
padding: 12px 16px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 100;
}
.logo-area { display: flex; align-items: center; gap: 10px; }
.logo-svg { width: 36px; height: 36px; }
.logo-text {
font-family: var(–font-heading);
font-weight: 900;
font-size: 1.4rem;
letter-spacing: 1px;
line-height: 1;
}
.logo-text .e { color: var(–red); }
.logo-text .g { color: var(–red); }
.logo-tagline {
font-family: var(–font-heading);
font-size: 0.65rem;
letter-spacing: 3px;
color: var(–white-muted);
text-transform: uppercase;
}
.header-nav { display: flex; gap: 4px; }
.nav-btn {
padding: 8px 12px;
border-radius: var(–radius);
font-family: var(–font-heading);
font-weight: 600;
font-size: 0.85rem;
letter-spacing: 0.5px;
text-transform: uppercase;
transition: background var(–transition);
color: var(–white-dim);
}
.nav-btn:hover, .nav-btn.active { background: var(–bg-card); color: var(–white); }
.nav-btn.active { border-bottom: 2px solid var(–red); }

/* ===== MAIN CONTENT ===== */
.main { max-width: 1200px; margin: 0 auto; padding: 16px; }
.hidden { display: none !important; }

/* ===== CALENDAR VIEW ===== */
.week-nav {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
}
.week-nav h2 {
font-family: var(–font-heading);
font-weight: 700;
font-size: 1.3rem;
letter-spacing: 0.5px;
}
.week-nav button {
background: var(–bg-card);
padding: 8px 16px;
border-radius: var(–radius);
font-weight: 600;
font-size: 0.9rem;
transition: background var(–transition);
}
.week-nav button:hover { background: var(–bg-card-hover); }

.week-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 8px;
margin-bottom: 20px;
}
@media (max-width: 768px) {
.week-grid { grid-template-columns: repeat(7, 1fr); gap: 4px; }
}

.day-card {
background: var(–bg-card);
border-radius: var(–radius-lg);
padding: 12px 8px;
text-align: center;
cursor: pointer;
transition: all var(–transition);
border: 2px solid transparent;
min-height: 90px;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
position: relative;
}
.day-card:hover { background: var(–bg-card-hover); border-color: var(–grey-light); }
.day-card.today { border-color: var(–red); }
.day-card.selected { border-color: var(–gold); background: var(–bg-card-hover); }
.day-card.completed {
background: rgba(39, 174, 96, 0.1);
border-color: var(–green-dark);
}
.day-card.completed::after {
content: ‘✓’;
position: absolute;
top: 4px;
right: 6px;
color: var(–green);
font-size: 0.8rem;
font-weight: 700;
}
.day-name {
font-family: var(–font-heading);
font-weight: 700;
font-size: 0.75rem;
text-transform: uppercase;
letter-spacing: 1px;
color: var(–white-muted);
}
.day-number {
font-family: var(–font-heading);
font-weight: 900;
font-size: 1.6rem;
line-height: 1;
}
.day-blocks {
display: flex;
gap: 3px;
margin-top: 4px;
}
.block-dot {
width: 8px;
height: 8px;
border-radius: 50%;
background: var(–grey);
}
.block-dot.done { background: var(–green); }
.block-dot.partial { background: var(–gold); }

/* ===== DAY DETAIL VIEW ===== */
.day-detail { margin-top: 8px; }
.day-detail-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
}
.day-detail-header h2 {
font-family: var(–font-heading);
font-weight: 900;
font-size: 1.5rem;
}
.back-btn {
background: var(–bg-card);
padding: 8px 16px;
border-radius: var(–radius);
font-weight: 600;
display: flex;
align-items: center;
gap: 6px;
}

.blocks-container {
display: grid;
grid-template-columns: 1fr;
gap: 16px;
}

.block-card {
background: var(–bg-card);
border-radius: var(–radius-lg);
overflow: hidden;
border: 1px solid var(–grey);
}
.block-header {
padding: 14px 16px;
display: flex;
align-items: center;
justify-content: space-between;
cursor: pointer;
transition: background var(–transition);
}
.block-header:hover { background: var(–bg-card-hover); }
.block-title-area { display: flex; align-items: center; gap: 10px; }
.block-icon {
width: 36px;
height: 36px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.1rem;
flex-shrink: 0;
}
.block-icon.cardio { background: rgba(192,57,43,0.2); color: var(–red-light); }
.block-icon.weights { background: rgba(212,163,74,0.2); color: var(–gold); }
.block-icon.flex { background: rgba(39,174,96,0.2); color: var(–green); }
.block-label {
font-family: var(–font-heading);
font-weight: 700;
font-size: 1.1rem;
letter-spacing: 0.5px;
}
.block-sub {
font-size: 0.8rem;
color: var(–white-muted);
}
.block-badge {
padding: 4px 10px;
border-radius: 20px;
font-size: 0.75rem;
font-weight: 600;
font-family: var(–font-heading);
letter-spacing: 0.5px;
}
.block-badge.pending { background: var(–grey); color: var(–white-dim); }
.block-badge.in-progress { background: rgba(212,163,74,0.2); color: var(–gold); }
.block-badge.complete { background: rgba(39,174,96,0.2); color: var(–green); }

.block-content {
padding: 0 16px 16px;
display: none;
}
.block-content.open { display: block; }

/* ===== EXERCISE LIST ===== */
.exercise-item {
background: var(–bg-secondary);
border-radius: var(–radius);
padding: 12px;
margin-bottom: 8px;
display: flex;
align-items: flex-start;
gap: 12px;
transition: all var(–transition);
border: 1px solid transparent;
}
.exercise-item.done {
opacity: 0.6;
border-color: var(–green-dark);
}
.exercise-check {
width: 28px;
height: 28px;
border-radius: 50%;
border: 2px solid var(–grey-light);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
flex-shrink: 0;
margin-top: 2px;
transition: all var(–transition);
font-size: 0.9rem;
}
.exercise-check:hover { border-color: var(–green); }
.exercise-check.checked {
background: var(–green);
border-color: var(–green);
color: #fff;
}
.exercise-info { flex: 1; min-width: 0; }
.exercise-name {
font-family: var(–font-heading);
font-weight: 700;
font-size: 1rem;
margin-bottom: 2px;
display: flex;
align-items: center;
gap: 8px;
}
.exercise-name .info-btn {
font-size: 0.75rem;
background: var(–grey);
width: 20px;
height: 20px;
border-radius: 50%;
display: inline-flex;
align-items: center;
justify-content: center;
cursor: pointer;
flex-shrink: 0;
}
.exercise-name .info-btn:hover { background: var(–red); }
.exercise-detail {
font-size: 0.85rem;
color: var(–white-muted);
margin-bottom: 6px;
}
.exercise-inputs {
display: flex;
gap: 8px;
flex-wrap: wrap;
align-items: center;
}
.exercise-inputs label {
font-size: 0.75rem;
color: var(–white-muted);
display: flex;
align-items: center;
gap: 4px;
}
.exercise-inputs input {
width: 60px;
padding: 4px 8px;
font-size: 0.85rem;
text-align: center;
}
.exercise-inputs select {
padding: 4px 8px;
font-size: 0.85rem;
}

/* ===== CARDIO SECTION ===== */
.cardio-type-selector {
display: flex;
gap: 8px;
margin-bottom: 12px;
flex-wrap: wrap;
}
.cardio-type-btn {
padding: 8px 16px;
border-radius: var(–radius);
background: var(–bg-secondary);
font-family: var(–font-heading);
font-weight: 600;
font-size: 0.9rem;
border: 1px solid var(–grey);
transition: all var(–transition);
}
.cardio-type-btn:hover { border-color: var(–white-muted); }
.cardio-type-btn.active { background: var(–red-dark); border-color: var(–red); }

.cardio-log {
background: var(–bg-secondary);
border-radius: var(–radius);
padding: 12px;
}
.cardio-log label {
display: block;
font-size: 0.85rem;
color: var(–white-muted);
margin-bottom: 4px;
}
.cardio-log input, .cardio-log textarea {
width: 100%;
margin-bottom: 8px;
}
.cardio-log textarea { resize: vertical; min-height: 60px; }

/* ===== YOGA / FLEX SECTION ===== */
.yoga-routine {
background: var(–bg-secondary);
border-radius: var(–radius);
padding: 12px;
margin-bottom: 8px;
}
.yoga-title {
font-family: var(–font-heading);
font-weight: 700;
font-size: 1rem;
margin-bottom: 4px;
display: flex;
align-items: center;
gap: 8px;
}
.yoga-desc {
font-size: 0.85rem;
color: var(–white-muted);
margin-bottom: 8px;
}
.yt-link {
display: inline-flex;
align-items: center;
gap: 6px;
background: var(–red-dark);
color: var(–white);
padding: 6px 12px;
border-radius: var(–radius);
text-decoration: none;
font-size: 0.8rem;
font-weight: 600;
transition: background var(–transition);
}
.yt-link:hover { background: var(–red); }

/* ===== BODY STATS ===== */
.stats-section { margin-bottom: 24px; }
.stats-section h3 {
font-family: var(–font-heading);
font-weight: 700;
font-size: 1.2rem;
margin-bottom: 12px;
color: var(–red-light);
}
.stats-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
gap: 10px;
}
.stat-input-card {
background: var(–bg-card);
border-radius: var(–radius);
padding: 12px;
}
.stat-input-card label {
display: block;
font-size: 0.75rem;
color: var(–white-muted);
margin-bottom: 4px;
font-family: var(–font-heading);
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.5px;
}
.stat-input-card input { width: 100%; }
.stat-input-card .unit {
font-size: 0.7rem;
color: var(–white-muted);
margin-top: 2px;
}
.save-stats-btn {
background: var(–red);
color: var(–white);
padding: 12px 24px;
border-radius: var(–radius);
font-family: var(–font-heading);
font-weight: 700;
font-size: 1rem;
letter-spacing: 0.5px;
margin-top: 16px;
transition: background var(–transition);
}
.save-stats-btn:hover { background: var(–red-light); }

/* ===== CHARTS ===== */
.chart-container {
background: var(–bg-card);
border-radius: var(–radius-lg);
padding: 16px;
margin-bottom: 16px;
}
.chart-container h4 {
font-family: var(–font-heading);
font-weight: 700;
font-size: 1rem;
margin-bottom: 12px;
color: var(–white-dim);
}
.chart-canvas { width: 100%; height: 200px; }

/* ===== STATS HISTORY TABLE ===== */
.stats-table-wrap { overflow-x: auto; margin-top: 16px; }
.stats-table {
width: 100%;
border-collapse: collapse;
font-size: 0.8rem;
}
.stats-table th {
font-family: var(–font-heading);
font-weight: 700;
text-transform: uppercase;
font-size: 0.7rem;
letter-spacing: 0.5px;
color: var(–white-muted);
padding: 8px;
text-align: left;
border-bottom: 1px solid var(–grey);
}
.stats-table td {
padding: 8px;
border-bottom: 1px solid rgba(74,69,64,0.3);
color: var(–white-dim);
}

/* ===== EXPORT BTN ===== */
.export-btn {
background: var(–bg-card);
border: 1px solid var(–grey);
padding: 10px 20px;
border-radius: var(–radius);
font-weight: 600;
display: inline-flex;
align-items: center;
gap: 8px;
transition: all var(–transition);
}
.export-btn:hover { border-color: var(–white-muted); background: var(–bg-card-hover); }

/* ===== MODAL ===== */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.7);
z-index: 200;
display: flex;
align-items: center;
justify-content: center;
padding: 16px;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
background: var(–bg-card);
border-radius: var(–radius-lg);
max-width: 500px;
width: 100%;
max-height: 80vh;
overflow-y: auto;
border: 1px solid var(–grey);
box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.modal-header {
padding: 16px;
border-bottom: 1px solid var(–grey);
display: flex;
align-items: center;
justify-content: space-between;
}
.modal-header h3 {
font-family: var(–font-heading);
font-weight: 700;
font-size: 1.2rem;
}
.modal-close {
width: 32px;
height: 32px;
border-radius: 50%;
background: var(–bg-secondary);
display: flex;
align-items: center;
justify-content: center;
font-size: 1.1rem;
}
.modal-body { padding: 16px; }
.modal-body p { margin-bottom: 10px; color: var(–white-dim); font-size: 0.9rem; line-height: 1.6; }
.modal-body .yt-link { margin-top: 8px; }

/* ===== CELEBRATION OVERLAY ===== */
.celebration-overlay {
position: fixed;
inset: 0;
z-index: 300;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: rgba(26,24,20,0.92);
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
}
.celebration-overlay.show { opacity: 1; pointer-events: auto; }

.celeb-logo {
width: 120px;
height: 120px;
margin-bottom: 20px;
animation: celebPulse 0.6s ease-in-out;
}
@keyframes celebPulse {
0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
50% { transform: scale(1.15) rotate(3deg); }
100% { transform: scale(1) rotate(0); opacity: 1; }
}
.celeb-text {
font-family: var(–font-heading);
font-weight: 900;
font-size: 1.8rem;
text-align: center;
margin-bottom: 8px;
animation: celebSlide 0.5s ease 0.2s both;
}
@keyframes celebSlide {
from { transform: translateY(20px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}
.celeb-sub {
font-size: 1rem;
color: var(–white-muted);
text-align: center;
animation: celebSlide 0.5s ease 0.4s both;
}

/* Big celebration for block/day complete */
.celeb-big .celeb-logo { width: 160px; height: 160px; }
.celeb-big .celeb-text { font-size: 2.2rem; color: var(–gold); }

/* ===== SETTINGS ===== */
.settings-card {
background: var(–bg-card);
border-radius: var(–radius-lg);
padding: 16px;
margin-bottom: 16px;
}
.settings-card h3 {
font-family: var(–font-heading);
font-weight: 700;
font-size: 1.1rem;
margin-bottom: 12px;
color: var(–red-light);
}
.settings-row {
display: flex;
align-items: center;
justify-content: space-between;
padding: 8px 0;
border-bottom: 1px solid rgba(74,69,64,0.3);
}
.settings-row:last-child { border-bottom: none; }
.settings-row label { font-size: 0.9rem; color: var(–white-dim); }
.settings-row input { width: 100px; text-align: center; }
.danger-btn {
background: var(–red-dark);
color: var(–white);
padding: 10px 20px;
border-radius: var(–radius);
font-weight: 600;
}
.danger-btn:hover { background: var(–red); }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
.header { padding: 10px 12px; }
.logo-text { font-size: 1.1rem; }
.nav-btn { padding: 6px 8px; font-size: 0.75rem; }
.day-number { font-size: 1.3rem; }
.day-card { padding: 8px 4px; min-height: 70px; }
.stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

</head>

// Cardio recommendations by day type
function getCardioRecommendation(dayOfWeek, weekNum) {
  // Weekend: Sat = rowing, Sun = punch bag
  if (dayOfWeek === 0) return { type: 'punchbag', suggestion: 'Punch Bag Session -- 3-min rounds with 1-min rest. Focus on combinations: jab-cross, hooks, uppercuts. 6-8 rounds.' };
  if (dayOfWeek === 6) return { type: 'rowing', suggestion: 'Rowing Session -- 5-min warm-up, then 4x5min intervals at moderate intensity with 2-min easy between. Cool down 5 mins.' };
  
  // Weekday Peloton rotation
  const classes = [
    { type: 'peloton', suggestion: 'Peloton: HIIT Ride (20-30 min) -- High intensity intervals. Great for fat burning and cardiovascular fitness.' },
    { type: 'peloton', suggestion: 'Peloton: Endurance Ride (30 min) -- Steady state at moderate effort. Builds aerobic base.' },
    { type: 'peloton', suggestion: 'Peloton: Power Zone Ride (30 min) -- Train in specific power zones for progressive improvement.' },
    { type: 'peloton', suggestion: 'Peloton: Climb Ride (20-30 min) -- Heavy resistance, simulates hill climbing. Great for leg strength.' },
    { type: 'peloton', suggestion: 'Peloton: Intervals & Arms (30 min) -- Combines cycling with light upper body work.' },
  ];
  return classes[(weekNum + dayOfWeek) % classes.length];
}

// ===== APP STATE =====
let state = {

};

function dateKey(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function getWeekStart(d) {
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday start
  const ws = new Date(d);
  ws.setDate(diff);
  ws.setHours(0,0,0,0);
  return ws;
}

function getWeekNum(d) {
  const start = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
}

function getPPLType(d) {
  // Use a fixed epoch to determine rotation
  const epoch = new Date(2026, 0, 5); // A Monday
  const diff = Math.floor((d - epoch) / 86400000);
  const idx = ((diff % 3) + 3) % 3;
  return ['push','pull','legs'][idx];
}

// ===== STORAGE =====
function saveState() {
  localStorage.setItem('eglingym_workouts', JSON.stringify(state.workouts));
  localStorage.setItem('eglingym_stats', JSON.stringify(state.bodyStats));
  localStorage.setItem('eglingym_settings', JSON.stringify(state.settings));
}
function loadState() {
  try {
    const w = localStorage.getItem('eglingym_workouts');
    const s = localStorage.getItem('eglingym_stats');
    const st = localStorage.getItem('eglingym_settings');
    if (w) state.workouts = JSON.parse(w);
    if (s) state.bodyStats = JSON.parse(s);
    if (st) state.settings = JSON.parse(st);
  } catch(e) { console.error('Load error', e); }
}

function showPage(page) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  ['calendar','stats','settings'].forEach(p => {
    document.getElementById('page-'+p).classList.toggle('hidden', p !== page);
  });
  if (page === 'stats') renderStats();
  if (page === 'settings') loadSettings();
}

// ===== CALENDAR =====
function initCalendar() {
  state.currentWeekStart = getWeekStart(new Date());
  renderWeek();
}

function changeWeek(dir) {
  const ws = new Date(state.currentWeekStart);
  ws.setDate(ws.getDate() + (dir * 7));
  state.currentWeekStart = ws;
  state.selectedDate = null;
  document.getElementById('day-detail').classList.add('hidden');
  renderWeek();
}

function renderWeek() {
  const ws = state.currentWeekStart;
  const we = new Date(ws);
  we.setDate(we.getDate() + 6);
  
  document.getElementById('week-title').textContent = 
    `${ws.getDate()} ${MONTHS[ws.getMonth()]} -- ${we.getDate()} ${MONTHS[we.getMonth()]} ${we.getFullYear()}`;
  
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  const today = dateKey(new Date());
  
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws);
    d.setDate(d.getDate() + i);
    const dk = dateKey(d);
    const workout = state.workouts[dk] || {};
    const isToday = dk === today;
    const isSelected = dk === state.selectedDate;
    
    const b1Done = workout.completed?.b1 || false;
    const b2Done = workout.completed?.b2 || false;
    const b3Done = workout.completed?.b3 || false;
    const allDone = b1Done && b2Done && b3Done;
    const anyDone = b1Done || b2Done || b3Done;
    
    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today' : '') + (isSelected ? ' selected' : '') + (allDone ? ' completed' : '');
    card.onclick = () => selectDay(dk, d);
    
    card.innerHTML = `
      <div class="day-name">${DAYS[d.getDay()]}</div>
      <div class="day-number">${d.getDate()}</div>
      <div class="day-blocks">
        <div class="block-dot ${b1Done ? 'done' : (workout.cardio ? 'partial' : '')}"></div>
        <div class="block-dot ${b2Done ? 'done' : (workout.weights?.some(w=>w.done) ? 'partial' : '')}"></div>
        <div class="block-dot ${b3Done ? 'done' : (workout.flex?.done ? 'partial' : '')}"></div>
      </div>
    `;
    grid.appendChild(card);
  }
}

function selectDay(dk, d) {
  state.selectedDate = dk;
  renderWeek();
  renderDayDetail(dk, d);
}

// ===== DAY DETAIL =====

  const cardioRec = getCardioRecommendation(dayOfWeek, weekNum);

  // Init workout data

      flex: { routine: flexIdx, done: false, notes: '' },
      completed: { b1: false, b2: false, b3: false }

  }
  
  const workout = state.workouts[dk];

  detail.innerHTML = `
    <div class="day-detail-header">
      <h2>${dayName} ${d.getDate()} ${MONTHS[d.getMonth()]}</h2>
      <button class="back-btn" onclick="closeDayDetail()">✕ Close</button>
    </div>
    
    <div class="blocks-container">

            <div class="block-icon cardio">🚴</div>
            <div>
              <div class="block-label">Block 1 -- Cardio</div>
              <div class="block-sub">30 minutes</div>
            </div>
          </div>
          <span class="block-badge ${b1Status}">${b1Status === 'complete' ? '✓ Done' : b1Status === 'in-progress' ? 'Started' : '30 min'}</span>
        </div>
        <div class="block-content" id="block-b1">
          ${renderCardioBlock(dk, workout, cardioRec, dayOfWeek)}
        </div>
      </div>
      
      <!-- BLOCK 2: WEIGHTS -->
      <div class="block-card">
        <div class="block-header" onclick="toggleBlock('b2')">
          <div class="block-title-area">
            <div class="block-icon weights">🏋️</div>
            <div>
              <div class="block-label">Block 2 -- ${WEIGHT_DAYS[pplType].name}</div>
              <div class="block-sub">30 minutes · ${weightsChecked}/${workout.weights.length} exercises</div>
            </div>
          </div>
          <span class="block-badge ${b2Status}">${b2Status === 'complete' ? '✓ Done' : b2Status === 'in-progress' ? `${weightsChecked}/${workout.weights.length}` : '60 min'}</span>
        </div>
        <div class="block-content" id="block-b2">
          ${renderWeightsBlock(dk, workout)}
        </div>
      </div>
      
      <!-- BLOCK 3: FLEXIBILITY -->
      <div class="block-card">
        <div class="block-header" onclick="toggleBlock('b3')">
          <div class="block-title-area">
            <div class="block-icon flex">🧘</div>
            <div>
              <div class="block-label">Block 3 -- Flexibility & Recovery</div>
              <div class="block-sub">30 minutes</div>
            </div>
          </div>
          <span class="block-badge ${b3Status}">${b3Status === 'complete' ? '✓ Done' : '90 min'}</span>
        </div>
        <div class="block-content" id="block-b3">
          ${renderFlexBlock(dk, workout, flexRoutine)}

      </div>

  const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

    </div>
    <div class="exercise-info">
      <div class="exercise-name">Mark Cardio Block Complete</div>
      <div class="exercise-detail">Tap when you've finished your cardio session</div>
    </div>
  </div>
</div>
```

`;
}

<label>Weight: <input type="number" step="0.5" value="${ex.actualKg}" placeholder="${ex.suggestedKg}" 
onchange="updateWeight('${dk}',${i},this.value)"> kg</label>
`: ''} </div> </div> </div>`).join(’’) + `<div style="margin-top:8px; padding-top:8px; border-top:1px solid var(--grey);"> <div class="exercise-item ${workout.completed.b2 ? 'done' : ''}"> <div class="exercise-check ${workout.completed.b2 ? 'checked' : ''}"  onclick="completeBlock('${dk}','b2')"> ${workout.completed.b2 ? '✓' : ''} </div> <div class="exercise-info"> <div class="exercise-name">Mark Weights Block Complete</div> <div class="exercise-detail">Tap when you've finished all weight exercises</div> </div> </div> </div>`;
}

function toggleExercise(dk, idx) {
const ex = state.workouts[dk].weights[idx];
ex.done = !ex.done;
saveState();

// Re-render the exercise item
const d = new Date(dk + ‘T12:00:00’);
renderDayDetail(dk, d);

// Celebrate!
if (ex.done) {
const msg = CHEESY_MESSAGES[Math.floor(Math.random() * CHEESY_MESSAGES.length)];
showCelebration(msg[0], msg[1], false);
}

// Check if all weights done
const allDone = state.workouts[dk].weights.every(w => w.done);
if (allDone && !state.workouts[dk].completed.b2) {
state.workouts[dk].completed.b2 = true;
saveState();
setTimeout(() => {
const bmsg = BLOCK_MESSAGES[Math.floor(Math.random() * BLOCK_MESSAGES.length)];
showCelebration(bmsg[0], bmsg[1], true);
renderWeek();
renderDayDetail(dk, d);
}, 1800);
}
}

function updateWeight(dk, idx, val) {

saveState();
}

}

// ===== CELEBRATION =====
function showCelebration(title, sub, big) {

document.getElementById(‘celeb-text’).textContent = title;
document.getElementById(‘celeb-sub’).textContent = sub;

// ===== BODY STATS =====
function renderStats() {
// Render input fields
const inputsEl = document.getElementById(‘stats-inputs’);
inputsEl.innerHTML = STAT_FIELDS.map(f => `<div class="stat-input-card"> <label>${f.label}</label> <input type="number" step="${f.step}" id="stat-${f.key}" placeholder="--"> <div class="unit">${f.unit}</div> </div>`).join(’’) + `<div class="stat-input-card" style="background:rgba(192,57,43,0.1);border:1px solid var(--red-dark);"> <label>BMI</label> <div id="bmi-display" style="font-family:var(--font-heading);font-weight:900;font-size:1.5rem;margin-top:4px;">--</div> <div class="unit">Auto-calculated</div> </div>`;

// Render charts
renderCharts();

// Render history table
renderStatsTable();
}

function saveStats() {
const entry = { date: dateKey(new Date()) };
let hasData = false;
STAT_FIELDS.forEach(f => {
const val = document.getElementById(‘stat-’+f.key).value;
if (val) { entry[f.key] = parseFloat(val); hasData = true; }
});

if (!hasData) { alert(‘Please enter at least one measurement.’); return; }

// Calculate BMI
if (entry.weight) {
const h = state.settings.height / 100;
entry.bmi = Math.round((entry.weight / (h * h)) * 10) / 10;
}

// Check if entry for today exists
const existingIdx = state.bodyStats.findIndex(s => s.date === entry.date);
if (existingIdx >= 0) {
state.bodyStats[existingIdx] = { …state.bodyStats[existingIdx], …entry };
} else {
state.bodyStats.push(entry);
}

state.bodyStats.sort((a,b) => a.date.localeCompare(b.date));
saveState();

// Clear inputs
STAT_FIELDS.forEach(f => { document.getElementById(‘stat-’+f.key).value = ‘’; });

showCelebration(‘STATS LOGGED! 📊’, ‘Tracking is the first step to winning!’, false);
renderCharts();
renderStatsTable();
}

// ===== CHARTS =====
function renderCharts() {
const area = document.getElementById(‘charts-area’);
if (state.bodyStats.length < 1) {
area.innerHTML = ‘<p style="color:var(--white-muted);font-size:0.9rem;">Log your first stats entry to see charts here.</p>’;
return;
}

const chartsToShow = [
{ key: ‘weight’, label: ‘Weight (kg)’, color: ‘#c0392b’ },
{ key: ‘bmi’, label: ‘BMI’, color: ‘#d4a34a’ },
{ key: ‘waist’, label: ‘Waist (cm)’, color: ‘#e74c3c’ },
{ key: ‘restHR’, label: ‘Resting HR (bpm)’, color: ‘#27ae60’ },
];

area.innerHTML = chartsToShow.map(c => `<div class="chart-container"> <h4>${c.label}</h4> <canvas id="chart-${c.key}" class="chart-canvas"></canvas> </div>`).join(’’);

chartsToShow.forEach(c => drawChart(c.key, c.label, c.color));
}

function drawChart(key, label, color) {
const canvas = document.getElementById(‘chart-’+key);
if (!canvas) return;
const ctx = canvas.getContext(‘2d’);
const rect = canvas.parentElement.getBoundingClientRect();
canvas.width = rect.width - 32;
canvas.height = 200;

const data = state.bodyStats.filter(s => s[key] != null);
if (data.length < 1) {
ctx.fillStyle = ‘#7a7268’;
ctx.font = ‘14px Barlow’;
ctx.fillText(‘No data yet’, 20, 100);
return;
}

const values = data.map(d => d[key]);
const min = Math.min(…values) * 0.95;
const max = Math.max(…values) * 1.05;
const range = max - min || 1;

const w = canvas.width;
const h = canvas.height;
const padL = 50, padR = 20, padT = 10, padB = 30;
const chartW = w - padL - padR;
const chartH = h - padT - padB;

// Grid lines
ctx.strokeStyle = ‘rgba(122,114,104,0.3)’;
ctx.lineWidth = 1;
for (let i = 0; i <= 4; i++) {
const y = padT + (chartH / 4) * i;
ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
const val = max - (range / 4) * i;
ctx.fillStyle = ‘#7a7268’;
ctx.font = ‘11px Barlow’;
ctx.textAlign = ‘right’;
ctx.fillText(val.toFixed(1), padL - 8, y + 4);
}

// Data line
ctx.strokeStyle = color;
ctx.lineWidth = 2.5;
ctx.lineJoin = ‘round’;
ctx.beginPath();
data.forEach((d, i) => {
const x = padL + (chartW / Math.max(data.length - 1, 1)) * i;
const y = padT + chartH - ((d[key] - min) / range) * chartH;
if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
});
ctx.stroke();

// Data points
data.forEach((d, i) => {
const x = padL + (chartW / Math.max(data.length - 1, 1)) * i;
const y = padT + chartH - ((d[key] - min) / range) * chartH;
ctx.beginPath();
ctx.arc(x, y, 4, 0, Math.PI * 2);
ctx.fillStyle = color;
ctx.fill();
ctx.strokeStyle = ‘#1a1814’;
ctx.lineWidth = 2;
ctx.stroke();
});

// Date labels
ctx.fillStyle = ‘#7a7268’;
ctx.font = ‘10px Barlow’;
ctx.textAlign = ‘center’;
const step = Math.max(1, Math.floor(data.length / 6));
data.forEach((d, i) => {
if (i % step === 0 || i === data.length - 1) {
const x = padL + (chartW / Math.max(data.length - 1, 1)) * i;
const parts = d.date.split(’-’);
ctx.fillText(`${parts[2]}/${parts[1]}`, x, h - 5);
}
});
}

function renderStatsTable() {
const wrap = document.getElementById(‘stats-table-wrap’);
if (state.bodyStats.length === 0) {
wrap.innerHTML = ‘<p style="color:var(--white-muted);font-size:0.85rem;">No entries yet.</p>’;
return;
}

const headers = [‘Date’, …STAT_FIELDS.map(f => f.label), ‘BMI’];
const rows = […state.bodyStats].reverse().map(s => {
return `<tr> <td>${s.date}</td> ${STAT_FIELDS.map(f => `<td>${s[f.key] != null ? s[f.key] : ‘--’}</td>`).join('')} <td>${s.bmi != null ? s.bmi : '--'}</td> </tr>`;
}).join(’’);

wrap.innerHTML = `<table class="stats-table"> <thead><tr>${headers.map(h =>`<th>${h}</th>`).join('')}</tr></thead> <tbody>${rows}</tbody> </table> `;
}

// ===== SETTINGS =====
function loadSettings() {
document.getElementById(‘set-height’).value = state.settings.height;
document.getElementById(‘set-yob’).value = state.settings.yob;
}
function saveSettings() {
state.settings.height = parseFloat(document.getElementById(‘set-height’).value) || 186.5;
state.settings.yob = parseInt(document.getElementById(‘set-yob’).value) || 1968;
saveState();
}

// ===== EXPORT =====
function exportCSV(type) {
let csv = ‘’;
if (type === ‘stats’) {
csv = ‘Date,’ + STAT_FIELDS.map(f=>f.label).join(’,’) + ‘,BMI\n’;
state.bodyStats.forEach(s => {
csv += s.date + ‘,’ + STAT_FIELDS.map(f => s[f.key] != null ? s[f.key] : ‘’).join(’,’) + ‘,’ + (s.bmi||’’) + ‘\n’;
});
} else {
csv = ‘Date,Block,Exercise,Sets,Reps,Suggested_kg,Actual_kg,Completed\n’;
Object.entries(state.workouts).forEach(([dk, w]) => {
// Cardio
csv += `${dk},Cardio,${w.cardio.type} - ${w.cardio.className||''},,,,,${w.completed.b1}\n`;
// Weights
w.weights.forEach(ex => {
csv += `${dk},Weights,${ex.name},${ex.sets},${ex.reps},${ex.suggestedKg},${ex.actualKg||''},${ex.done}\n`;
});
// Flex
csv += `${dk},Flexibility,${FLEX_ROUTINES[w.flex.routine]?.name||''},,,,,${w.completed.b3}\n`;
});
}

const blob = new Blob([csv], { type: ‘text/csv’ });
const a = document.createElement(‘a’);
a.href = URL.createObjectURL(blob);
a.download = `eglingym-${type}-${dateKey(new Date())}.csv`;
a.click();
}

function exportJSON() {
const data = { workouts: state.workouts, bodyStats: state.bodyStats, settings: state.settings, exported: new Date().toISOString() };
const blob = new Blob([JSON.stringify(data, null, 2)], { type: ‘application/json’ });
const a = document.createElement(‘a’);
a.href = URL.createObjectURL(blob);
a.download = `eglingym-backup-${dateKey(new Date())}.json`;
a.click();
}

function importJSON(event) {
const file = event.target.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = (e) => {
try {
const data = JSON.parse(e.target.result);
if (data.workouts) state.workouts = data.workouts;
if (data.bodyStats) state.bodyStats = data.bodyStats;
if (data.settings) state.settings = data.settings;
saveState();
alert(‘Data imported successfully!’);
location.reload();
} catch(err) {
alert(‘Error reading backup file.’);
}
};
reader.readAsText(file);
}

function resetData() {
if (confirm(‘This will delete ALL your workout and stats data. Are you sure?’)) {
if (confirm(‘Really? This cannot be undone!’)) {
localStorage.removeItem(‘eglingym_workouts’);
localStorage.removeItem(‘eglingym_stats’);
localStorage.removeItem(‘eglingym_settings’);
location.reload();
}
}
}

loadState();
initCalendar();
