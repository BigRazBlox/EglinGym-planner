<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EglinGym Test</title>
<style>
body{margin:0;font-family:sans-serif;}
.header{background:#1a1814;color:white;padding:20px;}
.nav{background:#333;color:white;padding:10px;display:flex;gap:10px;}
.nav button{background:#555;color:white;border:none;padding:8px 16px;cursor:pointer;}
.strip{background:#222;color:white;padding:10px;display:flex;gap:4px;}
.strip button{background:#444;color:white;border:none;padding:8px 12px;cursor:pointer;font-size:12px;}
.strip button.active{background:#c0392b;}
.main{padding:20px;}
</style>
</head>
<body>

<div class="header">
  <h2 style="color:#c0392b;display:inline;">E</h2><h2 style="display:inline;">GLIN</h2>
  <h2 style="color:#c0392b;display:inline;">G</h2><h2 style="display:inline;">YM</h2>
</div>

<div class="nav">
  <button onclick="changeWeek(-1)">&#8592;</button>
  <span id="calLbl" style="flex:1;text-align:center;line-height:2;">Loading...</span>
  <button onclick="goToToday()">Today</button>
  <button onclick="changeWeek(1)">&#8594;</button>
</div>

<div class="strip" id="weekStrip"></div>

<div class="main">
  <div id="dayContainer"><p style="color:#888;">Loading...</p></div>
</div>

<script>
var weekOff = 0;
var curDay = 0;
var DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var THEMES = ['Push','Legs','Push+','Pull','Hinge','Full','Pull+'];

function getMonday(off) {
  var t = new Date(), dow = t.getDay();
  var d = new Date(t);
  d.setDate(t.getDate() + (dow===0?-6:1-dow) + off*7);
  d.setHours(0,0,0,0);
  return d;
}

function render() {
  var mon = getMonday(weekOff);
  var dates = [];
  for(var i=0;i<7;i++) {
    var d = new Date(mon);
    d.setDate(mon.getDate()+i);
    dates.push(d);
  }
  
  // Week label
  var s=dates[0], e=dates[6];
  document.getElementById('calLbl').textContent = s.getDate()+' - '+e.getDate()+' '+
    ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][e.getMonth()]+' '+e.getFullYear();
  
  // Strip
  var strip = '';
  for(var i=0;i<7;i++) {
    strip += '<button'+(i===curDay?' class="active"':'')+' onclick="selDay('+i+')">'+
      DAYS[i]+'<br>'+dates[i].getDate()+'<br><small>'+THEMES[i]+'</small></button>';
  }
  document.getElementById('weekStrip').innerHTML = strip;
  
  // Day content
  var t = new Date();
  var dow = t.getDay();
  var todayIdx = dow===0?6:dow-1;
  document.getElementById('dayContainer').innerHTML = 
    '<h2>'+['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'][curDay]+'</h2>'+
    '<p>'+dates[curDay].getDate()+' '+['January','February','March','April','May','June','July','August','September','October','November','December'][dates[curDay].getMonth()]+' '+dates[curDay].getFullYear()+'</p>'+
    '<p style="color:#27ae60;">'+( curDay===todayIdx&&weekOff===0?'Today':'')+'</p>'+
    '<p>This is where the workout content goes.</p>';
}

function changeWeek(d) { weekOff += d; render(); }
function goToToday() { weekOff=0; var dow=new Date().getDay(); curDay=dow===0?6:dow-1; render(); }
function selDay(i) { curDay=i; render(); }

var dow = new Date().getDay();
curDay = dow===0?6:dow-1;
render();
</script>

</body>
</html>
