<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EglinGym -- Private Training</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif;background-color:#1a1814;color:#f5f0eb;min-height:100vh;overflow-x:hidden;line-height:1.5;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:#f5f0eb;font-size:inherit;-webkit-appearance:none}
input,select,textarea{font-family:inherit;color:#f5f0eb;background-color:#222019;border:1px solid #4a4540;border-radius:8px;padding:8px 12px;font-size:0.95rem;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:#c0392b}
a{color:#c0392b;text-decoration:none}
.hdr{background-color:#1a1814;border-bottom:3px solid #c0392b;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-a{display:flex;align-items:center;gap:10px}
.logo-a svg{width:32px;height:32px;flex-shrink:0}
.logo-t{font-weight:900;font-size:1.3rem;letter-spacing:1px;line-height:1.1}
.logo-t .r{color:#c0392b}
.logo-s{font-size:0.6rem;letter-spacing:3px;color:#7a7268;text-transform:uppercase}
.hnav{display:flex;gap:2px}
.hnav button{padding:10px 14px;border-radius:8px;font-weight:700;font-size:0.85rem;letter-spacing:0.5px;text-transform:uppercase;color:#b8b0a5}
.hnav button:active,.hnav button.on{background-color:#2a2722;color:#f5f0eb}
.mn{max-width:1100px;margin:0 auto;padding:16px}
.hide{display:none!important}
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px}
.wnav h2{font-weight:800;font-size:1.15rem;text-align:center;flex:1}
.wnav button{background-color:#2a2722;color:#f5f0eb;padding:10px 16px;border-radius:8px;font-weight:700;font-size:0.9rem;flex-shrink:0}
.wnav button:active{background-color:#332f2b}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.dc{background-color:#2a2722;border-radius:12px;padding:10px 4px;text-align:center;border:2px solid transparent;min-height:80px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.dc:active{background-color:#332f2b}
.dc.today{border-color:#c0392b}
.dc.sel{border-color:#d4a34a;background-color:#332f2b}
.dc.comp{background-color:rgba(39,174,96,0.15);border-color:#1e8449}
.dc.comp::after{content:'✓';position:absolute;top:3px;right:5px;color:#27ae60;font-size:0.7rem;font-weight:900}
.dn{font-weight:700;font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:#7a7268}
.dnum{font-weight:900;font-size:1.5rem;line-height:1}
.dots{display:flex;gap:3px;margin-top:3px}
.dot{width:7px;height:7px;border-radius:50%;background-color:#4a4540}
.dot.ok{background-color:#27ae60}
.dot.part{background-color:#d4a34a}
.dd-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dd-hdr h2{font-weight:900;font-size:1.4rem}
.closebtn{background-color:#2a2722;padding:10px 16px;border-radius:8px;font-weight:700;color:#f5f0eb}
.blk{background-color:#2a2722;border-radius:12px;overflow:hidden;margin-bottom:12px;border:1px solid #4a4540}
.blk-h{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.blk-h:active{background-color:#332f2b}
.blk-ta{display:flex;align-items:center;gap:10px}
.blk-ic{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.blk-ic.c1{background-color:rgba(192,57,43,0.2)}
.blk-ic.c2{background-color:rgba(212,163,74,0.2)}
.blk-ic.c3{background-color:rgba(39,174,96,0.2)}
.blk-lb{font-weight:700;font-size:1rem;letter-spacing:0.3px}
.blk-sb{font-size:0.8rem;color:#7a7268}
.badge{padding:4px 10px;border-radius:20px;font-size:0.7rem;font-weight:700;letter-spacing:0.3px;flex-shrink:0}
.badge.p{background-color:#4a4540;color:#b8b0a5}
.badge.ip{background-color:rgba(212,163,74,0.2);color:#d4a34a}
.badge.dn2{background-color:rgba(39,174,96,0.2);color:#27ae60}
.blk-c{padding:0 16px 16px;display:none}
.blk-c.open{display:block}
.exi{background-color:#222019;border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;border:1px solid transparent}
.exi.xdone{opacity:0.55;border-color:#1e8449}
.exck{width:30px;height:30px;border-radius:50%;border:2px solid #5a5550;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:0.9rem}
.exck:active{border-color:#27ae60}
.exck.on{background-color:#27ae60;border-color:#27ae60;color:#fff}
.exinf{flex:1;min-width:0}
.exnm{font-weight:700;font-size:0.95rem;margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ibtn{font-size:0.7rem;background-color:#4a4540;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#f5f0eb;flex-shrink:0}
.ibtn:active{background-color:#c0392b}
.exdt{font-size:0.82rem;color:#7a7268;margin-bottom:6px}
.exip{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.exip label{font-size:0.75rem;color:#7a7268;display:flex;align-items:center;gap:4px}
.exip input{width:65px;padding:5px 8px;font-size:0.85rem;text-align:center}
.csel{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cbtn{padding:10px 16px;border-radius:8px;background-color:#222019;font-weight:700;font-size:0.85rem;border:1px solid #4a4540;color:#f5f0eb}
.cbtn:active{border-color:#b8b0a5}
.cbtn.on{background-color:#962d22;border-color:#c0392b}
.clog{background-color:#222019;border-radius:8px;padding:12px}
.clog label{display:block;font-size:0.82rem;color:#7a7268;margin-bottom:4px}
.clog input,.clog textarea{width:100%;margin-bottom:8px}
.clog textarea{resize:vertical;min-height:60px}
.rec{color:#b8b0a5;font-size:0.85rem;margin-bottom:12px;line-height:1.5;padding:10px;background-color:#222019;border-radius:8px;border-left:3px solid #c0392b}
.rec strong{color:#f5f0eb}
.yog{background-color:#222019;border-radius:8px;padding:12px;margin-bottom:8px}
.yog-t{font-weight:700;font-size:1rem;margin-bottom:4px}
.yog-d{font-size:0.82rem;color:#7a7268;margin-bottom:8px;line-height:1.5}
.ytl{display:inline-flex;align-items:center;gap:6px;background-color:#962d22;color:#f5f0eb;padding:8px 14px;border-radius:8px;font-size:0.8rem;font-weight:700}
.ytl:active{background-color:#c0392b}
.sech{font-weight:800;font-size:1.15rem;margin-bottom:12px;color:#e74c3c}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.scard{background-color:#2a2722;border-radius:8px;padding:12px}
.scard label{display:block;font-size:0.7rem;color:#7a7268;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.scard input{width:100%}
.scard .u{font-size:0.65rem;color:#7a7268;margin-top:2px}
.savbtn{background-color:#c0392b;color:#f5f0eb;padding:14px 24px;border-radius:8px;font-weight:800;font-size:1rem;letter-spacing:0.3px;margin-top:16px;width:100%}
.savbtn:active{background-color:#e74c3c}
.chtc{background-color:#2a2722;border-radius:12px;padding:16px;margin-bottom:16px}
.chtc h4{font-weight:700;font-size:0.95rem;margin-bottom:12px;color:#b8b0a5}
.chtcv{width:100%;height:200px}
.twrap{overflow-x:auto;margin-top:16px;-webkit-overflow-scrolling:touch}
.stbl{width:100%;border-collapse:collapse;font-size:0.75rem}
.stbl th{font-weight:700;text-transform:uppercase;font-size:0.65rem;letter-spacing:0.5px;color:#7a7268;padding:8px 6px;text-align:left;border-bottom:1px solid #4a4540;white-space:nowrap}
.stbl td{padding:8px 6px;border-bottom:1px solid rgba(74,69,64,0.3);color:#b8b0a5;white-space:nowrap}
.xbtn{background-color:#2a2722;border:1px solid #4a4540;padding:10px 16px;border-radius:8px;font-weight:700;display:inline-flex;align-items:center;gap:8px;color:#f5f0eb;font-size:0.85rem}
.xbtn:active{background-color:#332f2b}
.mov{position:fixed;inset:0;background-color:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity 0.25s}
.mov.show{opacity:1;pointer-events:auto}
.mo{background-color:#2a2722;border-radius:12px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;border:1px solid #4a4540}
.mo-h{padding:16px;border-bottom:1px solid #4a4540;display:flex;align-items:center;justify-content:space-between}
.mo-h h3{font-weight:800;font-size:1.15rem}
.mo-x{width:34px;height:34px;border-radius:50%;background-color:#222019;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#f5f0eb}
.mo-b{padding:16px}
.mo-b p{margin-bottom:10px;color:#b8b0a5;font-size:0.9rem;line-height:1.6}
.celeb{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background-color:rgba(26,24,20,0.94);opacity:0;pointer-events:none;transition:opacity 0.25s}
.celeb.show{opacity:1;pointer-events:auto}
.celeb svg{width:110px;height:110px;margin-bottom:16px}
.celeb.show svg{animation:cpulse 0.5s ease-in-out}
@keyframes cpulse{0%{transform:scale(0.3) rotate(-10deg);opacity:0}50%{transform:scale(1.12) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.ct{font-weight:900;font-size:1.7rem;text-align:center;margin-bottom:6px}
.celeb.show .ct{animation:cslide 0.4s ease 0.15s both}
.cs2{font-size:0.95rem;color:#7a7268;text-align:center}
.celeb.show .cs2{animation:cslide 0.4s ease 0.3s both}
@keyframes cslide{from{transform:translateY(15px);opacity:0}to{transform:translateY(0);opacity:1}}
.celeb.big svg{width:150px;height:150px}
.celeb.big .ct{font-size:2rem;color:#d4a34a}
.setc{background-color:#2a2722;border-radius:12px;padding:16px;margin-bottom:16px}
.setc h3{font-weight:800;font-size:1.05rem;margin-bottom:12px;color:#e74c3c}
.setr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(74,69,64,0.3)}
.setr:last-child{border-bottom:none}
.setr label{font-size:0.9rem;color:#b8b0a5}
.setr input{width:100px;text-align:center}
.dbtn{background-color:#962d22;color:#f5f0eb;padding:10px 20px;border-radius:8px;font-weight:700}
.dbtn:active{background-color:#c0392b}
@media(max-width:600px){.hdr{padding:10px 12px}.logo-t{font-size:1.1rem}.hnav button{padding:8px 10px;font-size:0.75rem}.dnum{font-size:1.2rem}.dc{padding:8px 2px;min-height:68px}.sgrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

function rTbl(){var el=document.getElementById('st-tbl');if(S.bs.length===0){el.innerHTML='<p style="color:#7a7268;font-size:0.85rem">No entries yet.</p>';return}var hd=['Date'].concat(SF.map(function(f){return f.l})).concat(['BMI']);el.innerHTML='<table class="stbl"><thead><tr>'+hd.map(function(h){return'<th>'+h+'</th>'}).join('')+'</tr></thead><tbody>'+S.bs.slice().reverse().map(function(s){return'<tr><td>'+s.date+'</td>'+SF.map(function(f){return'<td>'+(s[f.k]!=null?s[f.k]:'--')+'</td>'}).join('')+'<td>'+(s.bmi!=null?s.bmi:'--')+'</td></tr>'}).join('')+'</tbody></table>'}
function lCfg(){document.getElementById('s-ht').value=S.cfg.ht;document.getElementById('s-yob').value=S.cfg.yob}
function savSet(){S.cfg.ht=parseFloat(document.getElementById('s-ht').value)||186.5;S.cfg.yob=parseInt(document.getElementById('s-yob').value)||1968;sv()}
function expCSV(type){var csv='';if(type==='stats'){csv='Date,'+SF.map(function(f){return f.l}).join(',')+',BMI\n';S.bs.forEach(function(s){csv+=s.date+','+SF.map(function(f){return s[f.k]!=null?s[f.k]:''}).join(',')+','+(s.bmi||'')+'\n'})}else{csv='Date,Block,Exercise,Sets,Reps,Suggested_kg,Actual_kg,Done\n';for(var k in S.wk){var w=S.wk[k];csv+=k+',Cardio,'+w.cardio.t+' - '+(w.cardio.cls||'')+',,,,,'+(w.comp.b1)+'\n';w.weights.forEach(function(ex){csv+=k+',Weights,'+ex.n+','+ex.s+','+ex.r+','+ex.kg+','+(ex.akg||'')+','+ex.done+'\n'});csv+=k+',Flex,'+(FL[w.flex.ri]?FL[w.flex.ri].n:'')+',,,,,'+(w.comp.b3)+'\n'}}var blob=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='eglingym-'+type+'-'+dk(new Date())+'.csv';a.click()}
function expJSON(){var data={wk:S.wk,bs:S.bs,cfg:S.cfg,exported:new Date().toISOString()};var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='eglingym-backup-'+dk(new Date())+'.json';a.click()}
function impJSON(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.wk)S.wk=d.wk;if(d.bs)S.bs=d.bs;if(d.cfg)S.cfg=d.cfg;sv();alert('Imported!');location.reload()}catch(err){alert('Error reading file.')}};r.readAsText(f)}
function resetAll(){if(confirm('Delete ALL data?')){if(confirm('Really? Cannot be undone!')){if(db){var tx=db.transaction('data','readwrite'),st=tx.objectStore('data');st.delete('wk');st.delete('bs');st.delete('cfg')}localStorage.removeItem('eg_w');localStorage.removeItem('eg_b');localStorage.removeItem('eg_c');location.reload()}}}
openDB(function(){ld(function(){initC()})});
